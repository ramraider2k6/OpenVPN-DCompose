---
# Only uncomment line 5 if using older docker-compose not "docker compose"
# version: "2.7"
# Open-vpn Docker compose file with quick values set and volume mounted for instant access.
# sudo docker pull openvpn/openvpn-as
services:
  openvpn-as:
    image: openvpn/openvpn-as:latest
    container_name: openvpn-as
#Network pre-recs
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - MKNOD
#Ports required
#943 = Web and admin gui
    ports:
      - 943:943
      - 443:443
      - 1194:1194/udp
    volumes:
      - ~/openvpn-data:/openvpn
    restart: unless-stopped
